# DigitalOcean App Platform spec
# Docs: https://docs.digitalocean.com/products/app-platform/reference/app-spec/
#
# Deployen:
#   1. Control panel: Apps → Create App → GitHub → kies deze repo (branch main),
#      of importeer deze spec.
#   2. CLI: doctl apps create --spec .do/app.yaml
#
# De app draait als kleine Node-service (±$5/maand) zodat het openbare
# scheepslogboek (/terminal.log) kan worden geschreven door server/server.js.
# Let op: het logbestand leeft in de container en wordt geleegd bij elke
# deploy/herstart. Wil je het logboek permanent bewaren, draai de site dan
# op een Droplet (zelfde server.js, wel persistent).
#
# Geen logboek nodig? Comment de `services:` uit en gebruik het
# `static_sites:`-blok onderaan — dat is gratis.

name: arjankapteijn
region: ams

services:
  - name: website
    environment_slug: node-js
    github:
      repo: arjankapteijn/website
      branch: main
      deploy_on_push: true
    build_command: npm run build
    run_command: node server/server.js
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb

# Gratis statisch alternatief (zonder scheepslogboek):
#
# static_sites:
#   - name: website
#     environment_slug: node-js
#     github:
#       repo: arjankapteijn/website
#       branch: main
#       deploy_on_push: true
#     build_command: npm run build
#     output_dir: dist
#     index_document: index.html
#     catchall_document: index.html

# Activeer de domeinen pas nadat de DNS van beide domeinen naar
# DigitalOcean wijst (CNAME naar de standaard-app-URL, of NS naar
# DigitalOcean DNS). Daarna onderstaande regels uncommenten en
# opnieuw deployen — de taalkeuze van de site volgt het domein
# (.nl = Nederlands, .com = Engels).
#
# domains:
#   - domain: arjankapteijn.nl
#     type: PRIMARY
#   - domain: www.arjankapteijn.nl
#     type: ALIAS
#   - domain: arjankapteijn.com
#     type: ALIAS
#   - domain: www.arjankapteijn.com
#     type: ALIAS
