name: CI

# Lint + test + build op elke push naar main en op elke PR (incl. Dependabot),
# zodat dependency-PR's meteen groen/rood tonen. Draait op ubuntu (1×-tarief)
# en bewaart geen artifacts → blijft binnen het gratis Actions-tegoed.
on:
  push:
    branches: [main]
  pull_request:

# nieuwe push op dezelfde branch annuleert een nog lopende run (scheelt minuten)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24 # gelijk aan de runtime in de Dockerfile
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
