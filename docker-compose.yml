# Voor TrueNAS SCALE (Apps → Discover Apps → ⋮ → Install via YAML) of
# elke andere Docker-host. Hang de container daarna achter Nginx Proxy
# Manager voor TLS/Let's Encrypt (zie README).

services:
  website:
    # Kant-en-klaar image van ghcr.io (gebouwd door GitHub Actions, privé).
    # Pull/update i.p.v. lokaal bouwen: `docker compose pull && docker compose up -d`,
    # of klik "Update" in de TrueNAS-app. Eenmalig inloggen: zie README.
    # Lokaal zelf bouwen? Vervang deze regel tijdelijk door `build: .`.
    image: ghcr.io/arjankapteijn/website:latest
    container_name: arjankapteijn-website
    restart: unless-stopped
    ports:
      # host-poort 8090 → container-poort 8080 (8080 is op TrueNAS vaak
      # al bezet door een andere app); pas de linkerkant gerust aan
      - '8090:8080'
    env_file: .env # SMTP-, Signal- en SolarEdge-gegevens; zie .env.example
    # geen volumes nodig: het logboek gaat via Signal, niets wordt weggeschreven
    # ── hardening ──
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=8m
    mem_limit: 256m
    pids_limit: 64
