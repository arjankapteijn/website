# Voor TrueNAS SCALE (Apps → Discover Apps → ⋮ → Install via YAML) of
# elke andere Docker-host. Hang de container daarna achter Nginx Proxy
# Manager voor TLS/Let's Encrypt (zie README).

services:
  website:
    build: .
    container_name: arjankapteijn-website
    restart: unless-stopped
    ports:
      # host-poort 8090 → container-poort 8080 (8080 is op TrueNAS vaak
      # al bezet door een andere app); pas de linkerkant gerust aan
      - '8090:8080'
    env_file: .env # SMTP-gegevens; zie .env.example
    volumes:
      - ./data:/data # persistent scheepslogboek (terminal.log)
    # ── hardening ──
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=8m
    mem_limit: 256m
    pids_limit: 64
